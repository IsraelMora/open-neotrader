name: neurotrader

# Variables de entorno necesarias en .env (ver .env.example):
#   ANTHROPIC_API_KEY, JWT_SECRET, TOTP_ISSUER
# API keys de providers van en la UI después del setup.

services:

  # ── Backend NestJS ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      # El código lee DATABASE_URL (no DB_PATH). Apunta al volumen persistente.
      DATABASE_URL: file:/data/neurotrader.db
      # Credenciales de providers (set vía API /credentials) persisten en el volumen:
      # CredentialsService escribe acá y ConfigModule lo lee en cada boot.
      DOTENV_PATH: /data/.env
      # Sandbox Python
      SANDBOX_RUNNER_PATH: /sandbox/runner.py
      SANDBOX_TIMEOUT_MS: ${SANDBOX_TIMEOUT_MS:-60000}
      SANDBOX_CPU_SECONDS: ${SANDBOX_CPU_SECONDS:-60}
      SANDBOX_MEM_MB: ${SANDBOX_MEM_MB:-512}
      PLUGINS_DIR: /plugins
      PLUGIN_SDK_PATH: /opt/plugin-sdk
      # Auth
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET requerido en .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      TOTP_ISSUER: ${TOTP_ISSUER:-NeuroTrader}
      # LLM — config NO-secreta acá; defaults alineados con .env.example (OpenRouter vía
      # backend OpenAI-compatible). OPENAI_BASE_URL es imprescindible con backend=openai:
      # sin él, la key de OpenRouter apunta a api.openai.com y los modelos OpenRouter
      # (p.ej. nemotron) fallan.
      LLM_BACKEND: ${LLM_BACKEND:-openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_MODEL: ${LLM_MODEL:-nvidia/nemotron-3-super-120b-a12b:free}
      # NOTA: las API keys (OPENAI_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY, brokers)
      # NO van acá. Declararlas con default vacío (${VAR:-}) las define como "" en el
      # contenedor, y @nestjs/config NO deja que /data/.env pise una env ya presente →
      # la credencial real del volumen queda TAPADA ("no configurada"). Se cargan por
      # POST /api/credentials, que las persiste en /data/.env (DOTENV_PATH).
      # CORS — separar por comas si hay múltiples origins
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    expose:
      # NO publicamos el puerto al host: en Dokploy/Traefik el proxy llega al
      # contenedor por la red interna de Docker (dominio configurado en la UI →
      # servicio web:80, que a su vez proxya /api → api:3000). Publicar el host
      # 3000 choca con el propio Dokploy (que ya escucha en :3000). Para debug
      # local, levantar la app nativa (pnpm dev) o un compose.override con ports.
      - "3000"
    volumes:
      # plugins/ y el sandbox ahora van horneados en la imagen (ver Dockerfile).
      - api-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health | grep -q '\"status\"' || exit 1"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    networks:
      - internal
    restart: unless-stopped

  # ── Panel web (Nginx sirviendo el build estático de Flutter/Astro) ─────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    expose:
      # El dominio del panel se enruta vía Traefik a este servicio (web:80) por la
      # red interna; no publicamos el puerto al host (evita choques y es innecesario).
      - "80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

networks:
  # Red interna — el API no tiene acceso a internet desde Docker
  # (para el sandbox Python sin red, usar SANDBOX_NETWORK=none en runtime)
  internal:
    driver: bridge
    internal: false   # true = sin acceso a internet (útil en producción)

volumes:
  api-data:     # Base de datos SQLite + config persistente
