name: neurotrader

# Variables de entorno necesarias en .env (ver .env.example):
#   ANTHROPIC_API_KEY, JWT_SECRET, TOTP_ISSUER
# API keys de providers van en la UI después del setup.

services:

  # ── Backend NestJS ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      # El código lee DATABASE_URL (no DB_PATH). Apunta al volumen persistente.
      DATABASE_URL: file:/data/neurotrader.db
      # Sandbox Python
      SANDBOX_RUNNER_PATH: /sandbox/runner.py
      SANDBOX_TIMEOUT_MS: ${SANDBOX_TIMEOUT_MS:-60000}
      SANDBOX_CPU_SECONDS: ${SANDBOX_CPU_SECONDS:-60}
      SANDBOX_MEM_MB: ${SANDBOX_MEM_MB:-512}
      PLUGINS_DIR: /plugins
      PLUGIN_SDK_PATH: /opt/plugin-sdk
      # Auth
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET requerido en .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      TOTP_ISSUER: ${TOTP_ISSUER:-NeuroTrader}
      # LLM — la API key se inyecta desde el host; nunca queda en la imagen
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-6}
      # CORS — separar por comas si hay múltiples origins
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    ports:
      # Loopback por defecto (no exponer en crudo). El proxy de Dokploy llega al
      # contenedor por la red interna de Docker al puerto 3000 + dominio configurado
      # en la UI; NO necesita el puerto publicado en el host. El bind local sirve
      # solo para debug. Para acceso externo, configurar el dominio en Dokploy.
      - "${API_PORT:-127.0.0.1:3000}:3000"
    volumes:
      # plugins/ y el sandbox ahora van horneados en la imagen (ver Dockerfile).
      - api-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health | grep -q '\"status\"' || exit 1"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    networks:
      - internal
    restart: unless-stopped

  # ── Panel web (Nginx sirviendo el build estático de Flutter/Astro) ─────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      # Loopback por defecto; el dominio del panel se enruta vía proxy de Dokploy.
      - "${WEB_PORT:-127.0.0.1:8080}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

networks:
  # Red interna — el API no tiene acceso a internet desde Docker
  # (para el sandbox Python sin red, usar SANDBOX_NETWORK=none en runtime)
  internal:
    driver: bridge
    internal: false   # true = sin acceso a internet (útil en producción)

volumes:
  api-data:     # Base de datos SQLite + config persistente
