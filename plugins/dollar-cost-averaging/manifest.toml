[plugin]
id          = "dollar-cost-averaging"
name        = "Dollar Cost Averaging (DCA)"
version     = "1.0.0"
type        = "discipline"
description = "Disciplina DCA: compras periódicas de importe fijo independientes del precio. Reduce el coste medio en mercados volátiles. Matemáticamente óptimo para activos con tendencia alcista a largo plazo (Vanguard 2012). Compatible con señales de cualquier skill."
author      = "NeuroTrader"
tags        = ["dca", "discipline", "long-term", "cost-averaging"]

[config]
amount_per_cycle  = 100.0      # USD por ciclo de compra
frequency_days    = 7           # cada N días
max_positions     = 5           # máximo de activos en DCA simultáneo
min_dip_pct       = 0.0         # solo comprar si el activo cayó X% (0 = siempre)
volatility_boost  = false        # aumentar importe en caídas fuertes (>5%)
volatility_multiplier = 2.0     # multiplicador cuando volatility_boost=true
allowed_types     = ["equity", "crypto", "etf"]

[scheduler]
mode        = "polling"
timeframe   = "1d"
interval_ms = 86400000

[permissions]
network    = false
filesystem = false
