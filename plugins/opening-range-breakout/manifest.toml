[plugin]
id          = "opening-range-breakout"
name        = "Opening Range Breakout (ORB)"
version     = "1.0.0"
type        = "skill"
description = "Estrategia intradiaria. El rango de los primeros N minutos de trading define el rango del día. La ruptura del máximo/mínimo inicial con volumen genera señal de entrada. Win rate ~55%, payoff ratio ~1.8 histórico. Requiere datos intradiarios (5m o 15m)."
author      = "OpenNeoTrader"
license     = "MIT"

[config]
[config.range_minutes]
type    = "number"
default = 15
min     = 5
max     = 60
label   = "Minutos del rango inicial"
description = "Los primeros N minutos definen el rango de referencia. 15 min es el estándar más probado."

[config.breakout_confirmation_pct]
type    = "number"
default = 0.1
min     = 0.0
max     = 0.5
label   = "Confirmación de ruptura (%)"
description = "El precio debe superar el extremo del rango en este % para confirmar la ruptura. 0.1 = 0.1% sobre el máximo/mínimo."

[config.volume_multiplier]
type    = "number"
default = 1.2
min     = 1.0
max     = 3.0
label   = "Multiplicador de volumen"
description = "La barra de ruptura debe tener volumen > promedio × este valor. Filtra rupturas falsas."

[config.max_entries_per_day]
type    = "number"
default = 2
min     = 1
max     = 5
label   = "Máx. entradas por día"
description = "Limita el número de señales por sesión. Evita sobretrading en días laterales."

[config.session_end_exit]
type    = "boolean"
default = true
label   = "Salida al cierre de sesión"
description = "Si true, cierra todas las posiciones ORB antes del cierre del mercado."

[hooks]
on_cycle = "hooks/cycle.py"

[permissions]
network     = false
emit_events = true

[scheduler]
mode        = "polling"
timeframe   = "5m"
interval_ms = 300000
