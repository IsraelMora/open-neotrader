[plugin]
id          = "kama-adaptive"
name        = "KAMA — Kaufman Adaptive Moving Average"
version     = "1.0.0"
type        = "skill"
description = "Kaufman (1995) Adaptive Moving Average que ajusta su velocidad según la Efficiency Ratio (ER). En mercados tendenciales el KAMA es rápido (EMA corta); en mercados caóticos/laterales es lento (EMA larga). Elimina whipsaws de EMAs fijas y supera al triple EMA en mercados reales. Emite señales de cruce KAMA vs precio y detección de régimen."
author      = "neurotrader"
tags        = ["adaptive", "moving-average", "kama", "trend-following", "noise-filter", "kaufman"]

[scheduler]
mode      = "polling"
timeframe = "1d"

[config]
period          = 10      # periodo de la Efficiency Ratio (default Kaufman: 10)
fast_period     = 2       # EMA rápida cuando ER=1 (default: 2)
slow_period     = 30      # EMA lenta cuando ER=0 (default: 30)
signal_threshold = 0.001  # umbral mínimo de cambio % para generar señal (evitar ruido)
warmup_bars     = 30      # barras de warmup antes de generar señales
