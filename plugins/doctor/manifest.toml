[plugin]
id          = "doctor"
name        = "Doctor — Diagnóstico del Sistema"
version     = "1.0.0"
type        = "extra"
description = "Chequeo de integridad al inicio de cada ciclo: valida plugins activos, credenciales requeridas, conexiones a providers y estado de la base de datos. Reporta advertencias al LLM y al log de auditoría."
author      = "neurotrader"
tags        = ["diagnostics", "health", "monitoring", "safety"]

[scheduler]
mode        = "polling"
timeframe   = "1h"
stage       = "pre"

[config]
fail_on_missing_credentials = false
check_provider_connectivity  = true
max_plugin_error_age_hours   = 24
