[plugin]
id          = "carry-trade"
name        = "Carry Trade"
version     = "1.0.0"
type        = "skill"
description = "Estrategia basada en diferenciales de tasas de interés: comprar la divisa de mayor rendimiento y vender la de menor rendimiento. Rentabilidad media histórica ~5-8% anual en pares AUD/JPY, NZD/JPY. Base: Uncovered Interest Rate Parity (UIP) theory."
author      = "neurotrader-community"
license     = "MIT"

[[tools]]
name        = "compute_carry"
description = "Calcula el diferencial de carry (tasa de interés) entre dos divisas y genera señal de entrada/salida."

[[tools]]
name        = "get_carry_pairs"
description = "Devuelve los pares con mayor carry positivo dados los tipos de interés actuales."

[config]
[config.min_carry_pct]
type        = "number"
default     = 2.0
min         = 0.5
max         = 8.0
label       = "Carry mínimo (%)"
description = "Diferencial de tasas mínimo para activar la señal de carry. 2% es el umbral estándar."

[config.use_momentum_filter]
type        = "boolean"
default     = true
label       = "Filtro de momentum"
description = "Solo entrar en carry trades cuando el par también muestra momentum positivo (precio > MA(200)). Reduce las pérdidas en períodos de risk-off."

[config.risk_off_exit]
type        = "boolean"
default     = true
label       = "Salir en risk-off"
description = "Salir de posiciones de carry cuando el VIX supera 25 (entorno de risk-off donde el carry se revierte bruscamente)."

[config.vix_threshold]
type        = "number"
default     = 25
min         = 15
max         = 40
label       = "Umbral VIX (risk-off)"
description = "Nivel de VIX por encima del cual se considera entorno de risk-off. Irrelevante si risk_off_exit=false."

[config.pairs]
type        = "text"
default     = "AUD/JPY,NZD/JPY,AUD/USD,NZD/USD"
label       = "Pares a monitorear"
description = "Pares de divisas a analizar para carry. Separados por comas."

[config.scheduler_interval_ms]
type        = "number"
default     = 86400000
label       = "Intervalo del scheduler (ms)"
description = "Frecuencia de análisis. Diario es suficiente — el carry es una estrategia posicional."

[hooks]
on_cycle = "hooks/cycle.py"

[permissions]
network     = false
emit_events = false

[scheduler]
mode        = "polling"
timeframe   = "1d"
interval_ms = 86400000
