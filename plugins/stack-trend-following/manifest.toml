[plugin]
id          = "stack-trend-following"
name        = "Stack: Trend Following"
version     = "1.0.0"
type        = "stack"
description = "Stack de seguimiento de tendencia: combina MACD Signal + EMA Crossover + Ichimoku Cloud + Momentum Factor + Volatility Regime Detection. Señal de consenso de 3/5 skills para reducir falsos positivos."
author      = "NeuroTrader"
tags        = ["stack", "trend-following", "momentum", "consensus"]

[config]
required_consensus    = 3       # skills que deben coincidir para señal firme
min_signal_strength   = 0.6     # fuerza mínima de señal (0-1)
veto_on_high_vix      = true    # veto si VIX > 30 (volatility-regime lo detecta)
exit_on_reverse_consensus = 2   # salir si ≥2 skills señalan dirección opuesta

[stack]
plugins = [
  "macd-signal",
  "ema-crossover-9-21",
  "ichimoku-cloud",
  "momentum-factor-12-1",
  "volatility-regime",
]

[scheduler]
mode        = "polling"
timeframe   = "1d"
interval_ms = 3600000

[permissions]
network    = false
filesystem = false
