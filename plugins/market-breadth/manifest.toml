[plugin]
id          = "market-breadth"
name        = "Market Breadth — Salud del Mercado Amplio"
version     = "1.0.0"
type        = "skill"
description = "Calcula indicadores de amplitud del mercado para evaluar la salud general del mercado. Incluye: Advance/Decline Ratio, % activos sobre MA200, McClellan Oscillator, New Highs/New Lows, y Breadth Thrust (Zweig). Detecta divergencias entre índice y breadth (warning de techo/suelo). Inyecta market_breadth_score y market_regime en el contexto del ciclo."
author      = "neurotrader"
tags        = ["market-breadth", "macro", "advance-decline", "mcclellan", "zweig", "regime"]

[scheduler]
mode      = "polling"
timeframe = "1d"

[config]
breadth_bullish_threshold  = 70     # score >70 → mercado sano, amplificar señales
breadth_bearish_threshold  = 30     # score <30 → mercado débil, reducir exposición
ma_period                  = 200    # período MA para % activos por encima
mcclellan_fast             = 19     # EMA rápida McClellan (Ratio Adjusted)
mcclellan_slow             = 39     # EMA lenta McClellan
thrust_period              = 10     # días para calcular Breadth Thrust de Zweig
emit_context_injection     = true   # inyectar score y régimen en contexto del ciclo
