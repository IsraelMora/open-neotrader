[plugin]
id          = "risk-envelope"
name        = "Risk Envelope (AI-First)"
version     = "1.0.0"
type        = "discipline"
description = "Veto duro matemático sobre propuestas de la IA. Aplica frenos de riesgo inviolables antes de cualquier ejecución: límite por activo, exposición total máxima, cortos prohibidos, reescalado proporcional. Sin exceptions."
author      = "neurotrader"
tags        = ["risk", "discipline", "ai-first", "veto", "safety"]

[scheduler]
mode = "none"

[config]
max_position_pct    = 0.40    # máximo 40% del portafolio en un solo activo
max_total_exposure  = 0.95    # máximo 95% de exposición total
allow_shorts        = false   # cortos prohibidos por defecto
max_single_trade_pct = 0.10   # máximo 10% del portafolio por operación individual
max_open_positions  = 10      # máximo 10 posiciones abiertas simultáneas
