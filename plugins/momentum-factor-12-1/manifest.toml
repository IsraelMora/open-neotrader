[plugin]
id          = "momentum-factor-12-1"
name        = "Momentum Factor 12-1"
version     = "1.0.0"
type        = "skill"
description = "Estrategia de momentum cross-sectional basada en retorno de 12 meses excluyendo el último mes (12-1). Probada académicamente por Jegadeesh & Titman (1993) con Sharpe ~0.5-0.7 anualizado en mercados desarrollados."
author      = "OpenNeoTrader"
license     = "MIT"

[config]
[config.lookback_months]
type    = "number"
default = 12
min     = 6
max     = 24
label   = "Meses de lookback"
description = "Período de cálculo del retorno de momentum. 12 meses es el estándar académico."

[config.skip_months]
type    = "number"
default = 1
min     = 0
max     = 3
label   = "Meses a omitir (reversal de corto plazo)"
description = "Omite el último N meses del cálculo para evitar el efecto de reversión de corto plazo. Valor estándar: 1."

[config.top_pct]
type    = "number"
default = 20
min     = 5
max     = 50
label   = "% top a comprar"
description = "Porcentaje superior del universo a incluir en la posición larga (ej. 20 = top 20%)."

[config.enable_short]
type    = "boolean"
default = false
label   = "Habilitar señales short (opt-in)"
description = "Cuando está desactivado (default) el plugin se comporta exactamente igual que antes: solo long/exit. Al activarlo, emite señales 'short' para el peor short_bottom_pct del universo con momentum absoluto negativo."

[config.short_bottom_pct]
type    = "number"
default = 10
min     = 5
max     = 50
label   = "% inferior a shortear"
description = "Porcentaje inferior del universo candidato a short (ej. 10 = peor 10%). Solo aplica si enable_short=true, y solo a símbolos con retorno 12-1 negativo."

[config.symbols]
type    = "string"
default = ""
label   = "Símbolos (override de universo)"
description = "Lista de símbolos separados por coma (ej. 'SPY,QQQ,GLD') que reemplaza el universo global para este portfolio. Vacío (default) = usa el universo activo sin cambios."

[config.regime_min_breadth]
type    = "number"
default = 0
min     = 0
max     = 100
label   = "% mínimo de amplitud (breadth) para operar"
description = "Filtro de régimen estilo Antonacci (dual momentum): porcentaje del universo que debe tener momentum positivo para permitir nuevas señales long/short. Si la amplitud medida cae por debajo de este umbral, el plugin entra en modo defensivo (cierra posiciones largas existentes, no abre nuevas). 0 (default) = filtro desactivado."

[config.rebalance_frequency]
type    = "string"
enum    = ["weekly", "monthly", "quarterly"]
default = "monthly"
label   = "Frecuencia de rebalanceo"
description = "Con qué frecuencia actualizar las posiciones. Mensual es el estándar académico."

[hooks]
on_cycle = "hooks/cycle.py"

[permissions]
network     = false
emit_events = true

[scheduler]
mode        = "polling"
timeframe   = "1d"
interval_ms = 86400000
