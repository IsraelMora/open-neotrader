[plugin]
id          = "correlation-guard"
name        = "Correlation Guard"
version     = "1.0.0"
type        = "discipline"
description = "Discipline de riesgo. Cancela señales de entrada en activos altamente correlacionados con posiciones ya abiertas (correlación > umbral). Evita la falsa diversificación — tener 5 posiciones con correlación 0.9 es como tener 1 posición con 5× el riesgo."
author      = "neurotrader-community"
license     = "MIT"

[config]
[config.max_correlation]
type    = "number"
default = 0.7
min     = 0.3
max     = 0.95
label   = "Correlación máxima permitida"
description = "Si dos activos tienen correlación > este valor, no abrir ambos. 0.7 es el umbral estándar."

[config.lookback_days]
type    = "number"
default = 60
min     = 20
max     = 252
label   = "Días de lookback para correlación"
description = "Período de datos para calcular la correlación. 60 días da la correlación reciente relevante."

[config.max_sector_exposure_pct]
type    = "number"
default = 30
min     = 10
max     = 60
label   = "Exposición máxima por sector (%)"
description = "No abrir más del X% del portfolio en el mismo sector. Complementa la correlación por activo."

[hooks]
on_cycle = "hooks/cycle.py"

[permissions]
network     = false
emit_events = true

[scheduler]
mode        = "polling"
timeframe   = "1d"
interval_ms = 86400000
