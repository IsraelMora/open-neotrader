[plugin]
id          = "kelly-criterion"
name        = "Kelly Criterion Position Sizer"
version     = "1.0.0"
type        = "discipline"
description = "Calcula el tamaño óptimo de posición usando el Criterio de Kelly. Maximiza el crecimiento geométrico del capital a largo plazo. Matemáticamente óptimo cuando se conocen win rate y payoff ratio."
author      = "neurotrader-community"
license     = "MIT"

[[tools]]
name        = "calculate_position_size"
description = "Calcula el tamaño óptimo de posición con Kelly Criterion. Devuelve fracción del capital a arriesgar."

[[tools]]
name        = "get_kelly_stats"
description = "Devuelve las estadísticas acumuladas (win rate, payoff ratio, kelly %) basadas en el historial de trades."

[config]
[config.kelly_fraction]
type        = "number"
default     = 0.5
min         = 0.1
max         = 1.0
label       = "Fracción Kelly"
description = "Fracción del Kelly completo a usar. 0.5 = Half-Kelly (recomendado para reducir varianza). Nunca usar Kelly completo (1.0) en producción."

[config.max_position_pct]
type        = "number"
default     = 10
min         = 1
max         = 25
label       = "Posición máxima (%)"
description = "Límite superior del tamaño de posición como % del capital total."

[config.min_trades_required]
type        = "number"
default     = 30
min         = 10
max         = 200
label       = "Trades mínimos requeridos"
description = "Número mínimo de trades históricos para calcular Kelly. Con menos trades, usa tamaño fijo de seguridad."

[config.safety_size_pct]
type        = "number"
default     = 2
min         = 0.5
max         = 5
label       = "Tamaño de seguridad (%)"
description = "Tamaño de posición fijo cuando no hay suficiente historial."

[hooks]
on_cycle = "hooks/cycle.py"

[permissions]
network     = false
emit_events = false

[scheduler]
mode        = "polling"
timeframe   = "1d"
interval_ms = 86400000
