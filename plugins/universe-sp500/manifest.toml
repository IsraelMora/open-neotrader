[plugin]
id          = "universe-sp500"
name        = "S&P 500 Universe"
version     = "1.0.0"
type        = "universe"
description = "Universo de los 500 activos del índice S&P 500. Filtra automáticamente por liquidez (volumen mínimo) y excluye empresas en proceso de quiebra o delisting. Actualización mensual de componentes."
author      = "OpenNeoTrader"
license     = "MIT"

[config]
[config.min_market_cap_b]
type    = "number"
default = 1.0
min     = 0.1
max     = 10.0
label   = "Cap de mercado mínimo (B USD)"
description = "Excluir empresas con capitalización menor a este valor. Reduce microcaps y mejora liquidez."

[config.max_symbols]
type    = "number"
default = 500
min     = 10
max     = 500
label   = "Máximo de símbolos"
description = "Limitar el universo a los N primeros por capitalización (útil para hardware limitado)."

[config.exclude_sectors]
type    = "string"
default = ""
label   = "Sectores a excluir"
description = "Lista separada por comas de sectores a excluir (ej: 'Financial,Energy'). Vacío = incluir todos."

[permissions]
network     = false
emit_events = false
