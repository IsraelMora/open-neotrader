[plugin]
id          = "backtester"
name        = "Backtester"
version     = "1.0.0"
type        = "extra"
description = "Motor de backtesting integrado. Permite testear estrategias con datos históricos usando numpy puro (sin dependencias externas). Calcula Sharpe, max drawdown, win rate, profit factor y curva de equity."
author      = "OpenNeoTrader"
tags        = ["backtesting", "analysis", "performance", "extra"]

[scheduler]
mode        = "none"   # se ejecuta bajo demanda via API

[permissions]
network     = false
filesystem  = false

[config]
initial_capital   = { type = "number",  default = 10000,  description = "Capital inicial en USD" }
commission_pct    = { type = "number",  default = 0.001,  description = "Comisión por operación (0.001 = 0.1%)" }
slippage_pct      = { type = "number",  default = 0.0005, description = "Slippage estimado por operación" }
risk_per_trade    = { type = "number",  default = 0.01,   description = "Riesgo por trade como fracción del capital (0.01 = 1%)" }
max_positions     = { type = "integer", default = 5,      description = "Máximo de posiciones simultáneas" }
benchmark         = { type = "string",  default = "SPY",  description = "Símbolo benchmark para comparar rendimiento" }
output_equity_curve = { type = "boolean", default = true, description = "Incluir curva de equity en resultado" }

# Walk-forward params (used by backtester.run_walk_forward)
in_sample_pct   = { type = "number",  default = 0.7,  description = "Fracción IS por ventana (default 70%)" }
n_windows       = { type = "integer", default = 5,    description = "Número de ventanas walk-forward" }
min_trades      = { type = "integer", default = 10,   description = "Mínimo de trades OOS para ventana válida" }

# Cross-sectional momentum params (used by backtester.run_cross_sectional)
top_n           = { type = "integer", default = 3,    description = "Número de activos a mantener (top-N por momentum)" }
rebalance_days  = { type = "integer", default = 21,   description = "Cada cuántas barras rebalancear (~mensual)" }
lookback        = { type = "integer", default = 252,  description = "Ventana de momentum en barras (~12 meses)" }
skip            = { type = "integer", default = 21,   description = "Barras recientes a saltar (momentum 12-1)" }
regime_filter   = { type = "boolean", default = false, description = "Dual momentum: ir a cash si la amplitud del mercado es débil" }
regime_min_breadth = { type = "number", default = 0.5, description = "Fracción mínima de nombres con momentum positivo para invertir" }

[skills]
keys = ["backtester.run", "backtester.run_walk_forward", "backtester.run_cross_sectional"]
