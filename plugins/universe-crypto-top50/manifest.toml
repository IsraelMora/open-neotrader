[plugin]
id          = "universe-crypto-top50"
name        = "Crypto Top 50"
version     = "1.0.0"
type        = "universe"
description = "Universo de las 50 criptomonedas con mayor capitalización de mercado. Excluye stablecoins (USDT, USDC, DAI, etc.). Rebalanceo semanal de componentes. Diseñado para uso con provider de Binance/CCXT."
author      = "neurotrader-community"
license     = "MIT"

[config]
[config.max_symbols]
type    = "number"
default = 50
min     = 5
max     = 200
label   = "Número de cryptos"
description = "Cuántas cryptos incluir (ordenadas por capitalización). 50 es el estándar."

[config.exclude_stablecoins]
type    = "boolean"
default = true
label   = "Excluir stablecoins"
description = "Si true, excluye USDT, USDC, DAI, BUSD, TUSD, FRAX y similares."

[config.quote_currency]
type    = "string"
enum    = ["USDT", "USDC", "BTC"]
default = "USDT"
label   = "Moneda de cotización"
description = "Pares en la forma SYMBOL/QUOTE_CURRENCY."

[permissions]
network     = false
emit_events = false
