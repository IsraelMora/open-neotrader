[plugin]
id          = "ichimoku-cloud"
name        = "Ichimoku Cloud"
version     = "1.0.0"
type        = "skill"
description = "Sistema Ichimoku Kinko Hyo (Goichi Hosoda, 1969): nube futura, líneas Tenkan/Kijun/Chikou. Win rate ~58% con confirmación de nube + chikou. Excelente para criptos y forex."
author      = "OpenNeoTrader"
tags        = ["trend", "ichimoku", "support-resistance", "crypto", "forex"]

[config]
tenkan_period   = 9        # Tenkan-sen (conversion line): high/low 9 periodos
kijun_period    = 26       # Kijun-sen (base line): high/low 26 periodos
senkou_b_period = 52       # Senkou Span B: high/low 52 periodos
timeframe       = "1d"
require_cloud_confirmation = true   # precio debe estar por encima/debajo de la nube
require_chikou_confirmation = true  # chikou debe confirmar dirección

[scheduler]
mode        = "polling"
timeframe   = "1d"
interval_ms = 3600000

[permissions]
network    = false
filesystem = false
