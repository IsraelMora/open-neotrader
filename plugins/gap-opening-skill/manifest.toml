[plugin]
id          = "gap-opening-skill"
name        = "Gap Opening Strategy"
version     = "1.0.0"
type        = "skill"
description = "Estrategia de gaps de apertura. Detecta gaps significativos entre el cierre anterior y la apertura del día. Gaps grandes (>2%) tienden a rellenarse en intraday. Gaps pequeños (0.5-2%) en tendencia tienden a continuar. Win rate: ~58-65%."
author      = "OpenNeoTrader"
tags        = ["skill", "gap", "intraday", "opening", "mean-reversion", "momentum"]

[scheduler]
mode        = "polling"
timeframe   = "1d"
interval_ms = 86_400_000   # diario — detecta gaps de apertura del día

[permissions]
network     = false
filesystem  = false

[config]
gap_threshold_pct    = { type = "number",  default = 0.5,   description = "Gap mínimo para considerar oportunidad (%)" }
large_gap_pct        = { type = "number",  default = 2.0,   description = "Gap grande que suele rellenarse (mean reversion)" }
volume_confirm_mult  = { type = "number",  default = 1.5,   description = "Multiplicador de volumen para confirmar el gap" }
continuation_min_pct = { type = "number",  default = 0.5,   description = "Gap mínimo en tendencia para señal de continuación" }
continuation_max_pct = { type = "number",  default = 2.0,   description = "Gap máximo para señal de continuación (sobre 2% = fade)" }
trend_ema_period     = { type = "integer", default = 20,    description = "Período EMA para determinar tendencia del activo" }
fade_large_gaps      = { type = "boolean", default = true,  description = "Operar a contra del gap grande (mean reversion)" }
follow_small_gaps    = { type = "boolean", default = true,  description = "Seguir gaps pequeños en tendencia (momentum)" }
